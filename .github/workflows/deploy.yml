name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # The deploy step pushes the built site to gh-pages. Without this the job's
    # GITHUB_TOKEN is read-only and the push is rejected with a 403.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - uses: julia-actions/cache@v2

      - name: Install dependencies
        run: julia --project -e 'using Pkg; Pkg.instantiate()'

      # A block scalar, not a folded plain scalar: YAML joins the continuation
      # lines of the latter with spaces, which handed Julia the single line
      # `using Franklin optimize(...)` and failed with a ParseError.
      - name: Build site
        run: |
          julia --project -e '
            using Franklin
            optimize(minify=false, prerender=false)'

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: __site
